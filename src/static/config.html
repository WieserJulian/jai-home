<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JAI Home Configuration</title>
    <style>
        body {font-family: Arial, sans-serif; margin: 2rem;}
        label {display: block; margin-top: 1rem;}
        input {margin-left: .5rem;}
        button {margin-top: 1rem;}
        #msg {margin-top: 1rem; color: green;}
    </style>
</head>
<body>
    <h1>JAI Home Configuration</h1>
    <form id="cfgForm">
        <label>Backend:
            <select name="backend" id="backend">
                <option value="ollama">ollama</option>
                <option value="vllm">vllm</option>
                <option value="openai">openai</option>
                <option value="anthropic">anthropic</option>
                <option value="copilot">copilot</option>
            </select>
        </label>
        <label>Model:
            <input type="text" name="model" id="model" placeholder="phi3" />
        </label>
        <button type="submit">Save</button>
    </form>
    <div id="msg"></div>

    <script>
        async function loadConfig() {
            const resp = await fetch('/config');
            if (!resp.ok) return;
            const cfg = await resp.json();
            if (cfg.backend) document.getElementById('backend').value = cfg.backend;
            if (cfg.model) document.getElementById('model').value = cfg.model;
        }
        document.getElementById('cfgForm').addEventListener('submit', async e => {
            e.preventDefault();
            const backend = document.getElementById('backend').value;
            const model = document.getElementById('model').value;
            const resp = await fetch('/config', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({backend, model})
            });
            const out = await resp.json();
            document.getElementById('msg').textContent = out.status === 'ok' ? 'Saved!' : 'Error';
        });
        loadConfig();
    </script>
</body>
</html>

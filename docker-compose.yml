version: "3.9"
services:
  ollama:
    build: ./docker/ollama
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama

  vllm:
    build: ./docker/vllm
    container_name: vllm
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MODEL=${VLLM_MODEL:-meta-llama/Meta-Llama-3-8B-Instruct}
    command: ["python", "-m", "vllm.entrypoints.openai.api_server", "--model", "$MODEL", "--port", "8000"]
    shm_size: "2gb"

volumes:
  ollama-models:

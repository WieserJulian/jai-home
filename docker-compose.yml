version: "3.9"
services:
  # Core JAI Home service (same as before)
  jai_home:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: jai_home
    restart: unless-stopped
    devices:
      - /dev/snd:/dev/snd
    environment:
      - TZ=Europe/Vienna
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./config:/config

  # Optional Home Assistant API service – enabled via the "ha" profile
  ha_api:
    build:
      context: ./docker
      dockerfile: Dockerfile
      args:
        ENABLE_HA: "1"
    container_name: jai_home_ha_api
    restart: unless-stopped
    environment:
      - ENABLE_HA=1
      - TZ=Europe/Vienna
    ports:
      - "8123:8123"
    profiles:
      - ha   # start with: docker compose --profile ha up

# To run only the core service:    docker compose up -d
# To run core + HA API service:   docker compose --profile ha up -d
